<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>香港獨旅小幫手</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --cream:   #faf6ee;
  --paper:   #f3ead8;
  --paper2:  #ece0c4;
  --brick:   #c0392b;
  --brick2:  #9b2335;
  --teal:    #1a6b6b;
  --teal2:   #134f4f;
  --amber:   #d4820a;
  --amber2:  #b06d08;
  --ink:     #2c1810;
  --ink2:    #5a3e2b;
  --ink3:    #8a6a52;
  --ink4:    #b89a7e;
  --white:   #fffdf7;
  --shadow:  rgba(44,24,16,0.12);
  --shadow2: rgba(44,24,16,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--cream);
  color: var(--ink);
  height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  /* Subtle grid paper texture */
  background-image:
    linear-gradient(rgba(180,150,100,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180,150,100,0.08) 1px, transparent 1px);
  background-size: 24px 24px;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--paper2); border-radius: 99px; }

/* ── LOADING ── */
#loading-screen {
  position: fixed; inset: 0; z-index: 999;
  background: var(--cream);
  background-image:
    linear-gradient(rgba(180,150,100,0.1) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180,150,100,0.1) 1px, transparent 1px);
  background-size: 24px 24px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
}
.loading-icon { font-size: 3rem; animation: bounce 1.2s ease infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.loading-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.5rem; font-weight: 900;
  color: var(--brick);
  letter-spacing: 0.08em;
}
.loading-sub {
  font-size: 0.75rem; color: var(--ink3);
  letter-spacing: 0.1em;
}
.loading-bar-bg {
  width: 160px; height: 3px;
  background: var(--paper2); border-radius: 99px; overflow: hidden;
}
.loading-bar-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--brick), var(--amber));
  border-radius: 99px;
  animation: loadbar 2s ease forwards;
}
@keyframes loadbar { 0%{width:0%} 60%{width:70%} 100%{width:90%} }
.loading-error {
  display: none; color: var(--brick);
  font-size: 0.78rem; text-align: center;
  padding: 0 28px; line-height: 1.7;
  white-space: pre-line; margin-top: 4px;
}
.loading-error.show { display: block; }

/* ── HEADER ── */
.app-header {
  background: var(--brick);
  padding: 0;
  z-index: 10;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
/* Red stripe texture on header */
.app-header::before {
  content: '';
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    -45deg, transparent, transparent 4px,
    rgba(255,255,255,0.04) 4px, rgba(255,255,255,0.04) 8px
  );
  pointer-events: none;
}
.header-top {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 18px 8px;
}
.header-left {}
.header-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.25rem; font-weight: 900;
  color: #fff;
  letter-spacing: 0.06em;
  line-height: 1.2;
  text-shadow: 1px 2px 4px rgba(0,0,0,0.3);
}
.header-sub {
  font-size: 0.62rem; color: rgba(255,255,255,0.7);
  margin-top: 3px; letter-spacing: 0.12em;
}
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
.header-badge {
  background: var(--amber);
  color: #fff; font-size: 0.58rem; font-weight: 700;
  padding: 2px 8px; border-radius: 3px; letter-spacing: 0.1em;
}
.sync-row { display: flex; align-items: center; gap: 5px; }
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.3); transition: all 0.3s;
}
.sync-dot.online { background: #7ef7b0; box-shadow: 0 0 6px rgba(126,247,176,0.7); }
.sync-dot.saving { background: #ffd97d; animation: pulse 0.8s ease infinite; }
.sync-dot.error  { background: #ffb3b3; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.sync-text { font-size: 0.55rem; color: rgba(255,255,255,0.6); letter-spacing: 0.06em; }

/* Decorative HK icon strip */
.header-icons {
  display: flex; align-items: center; gap: 0;
  background: var(--brick2);
  padding: 5px 18px;
  overflow: hidden;
}
.header-icon-item {
  display: flex; align-items: center; gap: 6px;
  color: rgba(255,255,255,0.55); font-size: 0.6rem;
  letter-spacing: 0.08em; padding-right: 16px;
  border-right: 1px solid rgba(255,255,255,0.15);
  margin-right: 16px; white-space: nowrap;
  flex-shrink: 0;
}
.header-icon-item:last-child { border-right: none; }
.header-icon-item svg { width: 14px; height: 14px; opacity: 0.7; flex-shrink: 0; }

/* ── MAIN ── */
#app-content { flex: 1; overflow-y: auto; padding-bottom: 90px; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  background: var(--white);
  border-top: 2px solid var(--paper2);
  display: flex;
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  box-shadow: 0 -4px 20px var(--shadow);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; color: var(--ink4); cursor: pointer; padding: 4px 0;
  transition: color 0.2s;
}
.nav-btn.active { color: var(--brick); }
.nav-btn.active .nav-icon-wrap { background: rgba(192,57,43,0.1); }
.nav-icon-wrap {
  width: 36px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px; transition: background 0.2s;
}
.nav-btn svg { width: 20px; height: 20px; stroke-width: 1.8; }
.nav-btn span { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.04em; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: 78px; right: 18px; z-index: 20;
  width: 50px; height: 50px; border-radius: 14px; border: none;
  background: var(--brick); color: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(192,57,43,0.4), 0 2px 6px rgba(0,0,0,0.15);
  transition: transform 0.15s, box-shadow 0.15s;
}
.fab:active { transform: scale(0.92); }
.fab svg { width: 22px; height: 22px; stroke-width: 2.5; }

/* ── DATE TABS ── */
.date-tabs {
  position: sticky; top: 0; z-index: 9;
  background: var(--paper);
  border-bottom: 2px solid var(--paper2);
  display: flex; gap: 8px;
  padding: 10px 14px;
  overflow-x: auto;
  box-shadow: 0 2px 8px var(--shadow2);
}
.date-tabs::-webkit-scrollbar { display: none; }
.date-tab {
  flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
  padding: 7px 16px; border-radius: 10px;
  border: 1.5px solid var(--paper2);
  background: var(--white); cursor: pointer;
  transition: all 0.2s; color: var(--ink3);
}
.date-tab:hover { border-color: var(--brick); color: var(--brick); }
.date-tab.active {
  background: var(--brick); border-color: var(--brick);
  color: #fff;
  box-shadow: 0 3px 10px rgba(192,57,43,0.3);
}
.date-tab .day-label { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.1em; }
.date-tab .date-label { font-size: 0.8rem; font-weight: 700; margin-top: 2px; }

/* ── SECTION HEADER ── */
.section-hero {
  background: var(--paper);
  border-bottom: 2px solid var(--paper2);
  padding: 14px 18px 10px;
  display: flex; align-items: center; gap: 10px;
}
.section-hero-icon { font-size: 1.6rem; line-height: 1; }
.section-hero-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.05rem; font-weight: 900; color: var(--ink);
}
.section-hero-sub { font-size: 0.7rem; color: var(--ink3); margin-top: 2px; }

/* ── TIMELINE ── */
.timeline { padding: 14px 14px 8px; display: flex; flex-direction: column; }
.tl-item { display: flex; position: relative; padding-bottom: 14px; animation: fadeUp 0.3s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.tl-time {
  flex-shrink: 0; width: 50px; padding-top: 11px;
  text-align: right; padding-right: 10px;
  font-size: 0.62rem; font-weight: 700; color: var(--brick);
  letter-spacing: 0.04em; line-height: 1;
}
.tl-spine { flex-shrink: 0; width: 18px; display: flex; flex-direction: column; align-items: center; padding-top: 13px; }
.tl-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--brick); flex-shrink: 0;
  box-shadow: 0 0 0 3px rgba(192,57,43,0.15);
  position: relative; z-index: 1;
}
.tl-line {
  flex: 1; width: 1.5px;
  background: linear-gradient(to bottom, var(--paper2), rgba(200,170,130,0.2));
  margin-top: 4px;
}
.tl-item:last-child .tl-line { display: none; }

.tl-card {
  flex: 1; background: var(--white);
  border: 1.5px solid var(--paper2);
  border-radius: 12px; padding: 11px 13px;
  margin-left: 10px; min-width: 0;
  box-shadow: 0 2px 8px var(--shadow2);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.tl-card:hover { border-color: var(--paper2); box-shadow: 0 4px 14px var(--shadow); }

.tl-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.tl-title { font-weight: 700; font-size: 0.93rem; color: var(--ink); line-height: 1.35; flex: 1; }
.tl-actions { display: flex; gap: 2px; flex-shrink: 0; }
.tl-btn {
  background: none; border: none; cursor: pointer;
  color: var(--ink4); padding: 4px; border-radius: 6px;
  transition: color 0.15s, background 0.15s;
}
.tl-btn:hover { color: var(--amber); background: rgba(212,130,10,0.1); }
.tl-btn.del:hover { color: var(--brick); background: rgba(192,57,43,0.1); }
.tl-btn svg { width: 13px; height: 13px; }

.location-chip {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 7px;
  background: rgba(26,107,107,0.07);
  color: var(--teal);
  border: 1px solid rgba(26,107,107,0.2);
  border-radius: 6px; padding: 3px 9px;
  font-size: 0.68rem; font-weight: 600; cursor: pointer;
  transition: background 0.15s; max-width: 100%;
  text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
  text-decoration: none;
}
.location-chip:hover { background: rgba(26,107,107,0.14); }
.location-chip svg { width: 10px; height: 10px; flex-shrink: 0; }

.tl-note {
  font-size: 0.72rem; color: var(--ink3); margin-top: 7px;
  background: var(--paper);
  border-left: 2.5px solid var(--amber);
  padding: 5px 9px; border-radius: 0 6px 6px 0;
  line-height: 1.65;
}

.empty-state {
  text-align: center; color: var(--ink4); font-size: 0.85rem;
  padding: 52px 20px; line-height: 2;
}
.empty-state-icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }

/* ── TODO ── */
.section-pad { padding: 14px; }
.progress-card {
  background: var(--white); border: 1.5px solid var(--paper2);
  border-radius: 14px; padding: 15px; margin-bottom: 14px;
  box-shadow: 0 2px 8px var(--shadow2);
}
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.progress-title { font-weight: 700; font-size: 0.9rem; color: var(--ink); }
.progress-count { font-size: 0.82rem; font-weight: 700; color: var(--brick); }
.progress-bar-bg { height: 5px; background: var(--paper2); border-radius: 99px; overflow: hidden; }
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--brick), var(--amber));
  border-radius: 99px; transition: width 0.5s ease;
}
.progress-label { font-size: 0.7rem; color: var(--ink3); margin-top: 8px; }

.todo-list {
  background: var(--white); border: 1.5px solid var(--paper2);
  border-radius: 14px; overflow: hidden;
  box-shadow: 0 2px 8px var(--shadow2);
}
.todo-item {
  display: flex; align-items: center;
  padding: 12px 15px; border-bottom: 1px solid var(--paper);
  gap: 11px;
}
.todo-item:last-child { border-bottom: none; }

.todo-checkbox {
  appearance: none; -webkit-appearance: none;
  width: 20px; height: 20px;
  border: 1.5px solid var(--ink4); border-radius: 6px;
  background: transparent; cursor: pointer; flex-shrink: 0;
  transition: all 0.2s; position: relative;
}
.todo-checkbox:checked {
  background: var(--brick); border-color: var(--brick);
  box-shadow: 0 2px 6px rgba(192,57,43,0.3);
}
.todo-checkbox:checked::after {
  content: ''; position: absolute;
  width: 5px; height: 9px;
  border-right: 2px solid white; border-bottom: 2px solid white;
  transform: rotate(45deg) translate(-1px,-1px);
}
.todo-label { flex: 1; font-size: 0.875rem; color: var(--ink); cursor: pointer; transition: color 0.2s; }
.todo-label.done { color: var(--ink4); text-decoration: line-through; }
.todo-del {
  background: none; border: none; cursor: pointer;
  color: var(--ink4); padding: 4px; border-radius: 6px;
  transition: color 0.15s;
}
.todo-del:hover { color: var(--brick); }
.todo-del svg { width: 14px; height: 14px; }

/* ── EXPENSES ── */
.expense-hero {
  margin: 14px; background: var(--brick);
  border-radius: 18px; padding: 20px;
  position: relative; overflow: hidden;
  box-shadow: 0 6px 20px rgba(192,57,43,0.3);
}
.expense-hero::before {
  content: '';
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    -45deg, transparent, transparent 6px,
    rgba(255,255,255,0.04) 6px, rgba(255,255,255,0.04) 12px
  );
  pointer-events: none;
}
.expense-hero::after {
  content: '$';
  position: absolute; right: -8px; top: -16px;
  font-size: 110px; font-weight: 900;
  color: rgba(255,255,255,0.06);
  font-family: 'Playfair Display', serif;
  pointer-events: none;
}
.expense-label { font-size: 0.6rem; color: rgba(255,255,255,0.65); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 6px; }
.expense-total { font-size: 2.3rem; font-weight: 900; color: #fff; letter-spacing: -0.02em; line-height: 1; margin-bottom: 16px; font-family: 'Playfair Display', serif; text-shadow: 1px 2px 6px rgba(0,0,0,0.2); }
.expense-split { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.expense-split-item { background: rgba(255,255,255,0.12); border-radius: 10px; padding: 10px 12px; backdrop-filter: blur(4px); }
.split-label { font-size: 0.62rem; color: rgba(255,255,255,0.65); margin-bottom: 3px; }
.split-val { font-size: 0.95rem; font-weight: 700; color: #fff; }

.expense-section-title {
  font-size: 0.6rem; font-weight: 700; color: var(--ink3);
  letter-spacing: 0.18em; text-transform: uppercase;
  padding: 4px 14px 10px;
}
.expense-list { display: flex; flex-direction: column; gap: 8px; padding: 0 14px; }
.expense-item {
  background: var(--white); border: 1.5px solid var(--paper2);
  border-radius: 12px; padding: 12px 14px;
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
  box-shadow: 0 2px 6px var(--shadow2);
}
.expense-item-left { flex: 1; min-width: 0; }
.expense-item-name { font-weight: 700; font-size: 0.875rem; color: var(--ink); }
.expense-item-type { font-size: 0.62rem; margin-top: 3px; color: var(--ink3); }
.expense-item-right { display: flex; align-items: center; gap: 10px; text-align: right; }
.expense-amount { font-size: 0.92rem; font-weight: 700; }
.expense-amount.hkd { color: var(--brick); }
.expense-amount.twd { color: var(--teal); }
.expense-approx { font-size: 0.62rem; color: var(--ink4); margin-top: 2px; }
.expense-del { background: none; border: none; cursor: pointer; color: var(--ink4); padding: 4px; border-radius: 6px; transition: color 0.15s; }
.expense-del:hover { color: var(--brick); }
.expense-del svg { width: 14px; height: 14px; }

/* ── EXCHANGE ── */
.exchange-wrap { padding: 20px 16px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
.exchange-card {
  background: var(--white); border: 1.5px solid var(--paper2);
  border-radius: 20px; width: 100%; max-width: 380px; overflow: hidden;
  box-shadow: 0 4px 16px var(--shadow);
}
.exchange-header {
  background: var(--teal); padding: 18px 20px; text-align: center;
  position: relative; overflow: hidden;
}
.exchange-header::before {
  content: '';
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    -45deg, transparent, transparent 5px,
    rgba(255,255,255,0.04) 5px, rgba(255,255,255,0.04) 10px
  );
}
.exchange-header-title { font-family: 'Noto Serif TC', serif; font-size: 1.05rem; color: #fff; font-weight: 900; letter-spacing: 0.05em; }
.exchange-rate-label { font-size: 0.65rem; color: rgba(255,255,255,0.65); margin-top: 5px; letter-spacing: 0.08em; }
.exchange-body { padding: 22px 18px; display: flex; flex-direction: column; gap: 14px; }
.calc-field label { display: block; font-size: 0.6rem; font-weight: 700; color: var(--ink3); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 7px; }
.calc-input-wrap {
  display: flex; align-items: center;
  background: var(--paper); border: 1.5px solid var(--paper2);
  border-radius: 12px; padding: 10px 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.calc-input-wrap:focus-within { border-color: var(--brick); box-shadow: 0 0 0 3px rgba(192,57,43,0.1); }
.calc-currency { font-size: 0.78rem; font-weight: 700; color: var(--ink3); margin-right: 10px; letter-spacing: 0.06em; }
.calc-input { flex: 1; background: transparent; border: none; outline: none; font-size: 1.7rem; font-weight: 900; color: var(--ink); min-width: 0; font-family: 'Playfair Display', serif; }
.calc-input::placeholder { color: var(--ink4); }
.calc-input.result { color: var(--brick); }
.exchange-divider { display: flex; justify-content: center; }
.exchange-arrow {
  background: var(--paper); border: 1.5px solid var(--paper2);
  border-radius: 50%; width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  color: var(--teal);
}
.exchange-arrow svg { width: 16px; height: 16px; }
.exchange-tip { text-align: center; font-size: 0.72rem; color: var(--ink3); line-height: 1.7; }

/* HK Illustration banner */
.hk-banner {
  margin: 14px 14px 0;
  background: var(--teal);
  border-radius: 14px; padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
  overflow: hidden; position: relative;
  box-shadow: 0 3px 12px rgba(26,107,107,0.25);
}
.hk-banner::before {
  content: '';
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    -45deg, transparent, transparent 5px,
    rgba(255,255,255,0.03) 5px, rgba(255,255,255,0.03) 10px
  );
}
.hk-banner-text { position: relative; z-index: 1; }
.hk-banner-title { font-family: 'Noto Serif TC', serif; font-weight: 900; color: #fff; font-size: 0.9rem; }
.hk-banner-sub { font-size: 0.65rem; color: rgba(255,255,255,0.65); margin-top: 3px; }
.hk-banner-icons { display: flex; gap: 10px; position: relative; z-index: 1; }
.hk-banner-icons span { font-size: 1.4rem; }

/* ── MODALS ── */
#modal-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(44,24,16,0.45);
  backdrop-filter: blur(3px);
  display: none; align-items: flex-end; justify-content: center;
}
#modal-overlay.show { display: flex; }
.modal-sheet {
  background: var(--white);
  border-top: 2px solid var(--paper2);
  border-radius: 24px 24px 0 0;
  width: 100%; max-width: 480px;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
  animation: slideUp 0.28s cubic-bezier(0.16,1,0.3,1) both;
  display: none;
  box-shadow: 0 -8px 32px var(--shadow);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-sheet.show { display: block; }
.modal-handle { width: 36px; height: 4px; background: var(--paper2); border-radius: 99px; margin: 0 auto 18px; }
.modal-title { font-family: 'Noto Serif TC', serif; font-size: 1.1rem; font-weight: 900; color: var(--ink); margin-bottom: 18px; }

.form-group { margin-bottom: 14px; }
.form-label {
  display: block; font-size: 0.6rem; font-weight: 700;
  color: var(--ink3); letter-spacing: 0.14em;
  text-transform: uppercase; margin-bottom: 7px;
}
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }

.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--paper);
  border: 1.5px solid var(--paper2); border-radius: 10px;
  padding: 10px 13px; color: var(--ink);
  font-family: 'Noto Sans TC', sans-serif; font-size: 0.875rem;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--brick); box-shadow: 0 0 0 3px rgba(192,57,43,0.1);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--ink4); }
.form-select { appearance: none; }
.form-textarea { resize: none; line-height: 1.6; }
.input-with-icon { position: relative; }
.input-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--ink4); }
.input-icon svg { width: 14px; height: 14px; }
.input-with-icon .form-input { padding-left: 34px; }

.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
.btn-cancel {
  background: none; border: 1.5px solid var(--paper2);
  border-radius: 10px; padding: 9px 18px;
  color: var(--ink2); font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.875rem; cursor: pointer; transition: background 0.15s;
}
.btn-cancel:hover { background: var(--paper); }
.btn-save {
  background: var(--brick); border: none; border-radius: 10px;
  padding: 9px 22px; color: #fff;
  font-family: 'Noto Sans TC', sans-serif; font-weight: 700;
  font-size: 0.875rem; cursor: pointer;
  box-shadow: 0 3px 10px rgba(192,57,43,0.35);
  transition: opacity 0.15s, transform 0.1s;
}
.btn-save:active { opacity: 0.85; transform: scale(0.97); }

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=time]::-webkit-calendar-picker-indicator { opacity: 0.5; }
option { background: #faf6ee; color: #2c1810; }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, setDoc, updateDoc, deleteDoc, writeBatch, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {

  authDomain: "summerhkg-31155.firebaseapp.com",
  projectId: "summerhkg-31155",
  storageBucket: "summerhkg-31155.firebasestorage.app",
  messagingSenderId: "136735319981",
  appId: "1:136735319981:web:258a628dbdff6cf6112324"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const SEED_ITINERARY = {
  '2026-04-02':[
    {id:'1',time:'13:40',title:'出發飛往香港 ✈️',location:'桃園國際機場第一航廈',note:'UO111。記得帶護照與印好的港簽！'},

    {id:'3',time:'16:30',title:'搭城巴 A22 前往市區',location:'香港機場城巴A22巴士站',note:'在「上海街，佐敦道」站下車'},
    {id:'4',time:'17:30',title:'入住 LongWin Hostel',location:'長榮旅舍 佐敦',note:'佐敦站附近。放好行李休息一下'},
    {id:'5',time:'18:30',title:'佐敦/油麻地晚餐 🍜',location:'廟街 油麻地',note:'推薦：澳洲牛奶公司、麥文記麵家。吃飽逛廟街'}
  ],
  '2026-04-03':[
    {id:'6',time:'09:00',title:'搭乘天星小輪 ⛴️',location:'尖沙咀天星碼頭',note:'從尖沙咀搭到中環，欣賞維港早晨'},

    {id:'8',time:'14:00',title:'太平山頂 ⛰️',location:'山頂廣場 香港',note:'搭第六代山頂纜車上山看風景'},
    {id:'9',time:'18:00',title:'叮叮車前往銅鑼灣',location:'銅鑼灣 香港',note:'體驗復古叮叮車，晚餐銅鑼灣逛街'}
  ],
  '2026-04-04':[
    {id:'10',time:'10:00',title:'深水埗在地文化 🏘️',location:'深水埗鴨寮街',note:'逛鴨寮街、大南街咖啡廳。吃合益泰小食腸粉！'},
    {id:'11',time:'14:30',title:'旺角血拚 🛍️',location:'旺角女人街',note:'女人街、金魚街、波鞋街。感受香港快節奏'},
    {id:'12',time:'18:30',title:'晚餐：港式飲茶或冰室',location:'旺角 香港',note:'推薦一點心或義順牛奶公司'}
  ],
  '2026-04-05':[
    {id:'13',time:'09:00',title:'退房，寄放行李',location:'長榮旅舍 佐敦',note:'08:00-11:00 前需退房'},
    {id:'14',time:'10:00',title:'最後採買伴手禮 🎁',location:'珍妮曲奇 香港',note:'珍妮曲奇(備現金)、Bakehouse蛋塔'},
    {id:'15',time:'12:00',title:'搭城巴 A22 前往機場',location:'佐敦 上海街巴士站',note:'提早出發，抓緊時間'},

  ]
};
const SEED_TODOS=[
  {id:'t1',text:'機票 (4/2 - 4/5)',done:true,order:0},
  {id:'t2',text:'住宿 (Long Win 長榮旅舍)',done:true,order:1},
  {id:'t3',text:'港簽 (印出實體紙本)',done:false,order:2},
  {id:'t4',text:'eSIM 網卡',done:false,order:3},
  {id:'t5',text:'旅遊不便險 (國泰或富邦)',done:false,order:4},
  {id:'t6',text:'下載香港城巴 App',done:false,order:5},
  {id:'t7',text:'設定 Apple Pay 數位八達通',done:false,order:6}
];
const SEED_EXPENSES=[
  {id:'e1',title:'來回機票',amount:9965,currency:'TWD',createdAt:1000},
  {id:'e2',title:'住宿 (三晚)',amount:4846,currency:'TWD',createdAt:1001}
];

const RATE=4.1;
let currentTab='itinerary', selectedDate='2026-04-02';
let appData={itinerary:{},todos:[],expenses:[]};

const $=id=>document.getElementById(id);
function setMsg(m){$('loading-msg').textContent=m;}
function setSyncState(s,t){$('sync-dot').className='sync-dot '+s;$('sync-text').textContent=t;}
function showApp(){
  $('loading-screen').style.display='none';
  $('main-header').style.display='';
  $('main-nav').style.display='';
  $('fab').style.display='flex';
  setSyncState('online','已同步');
  render();
}
function showError(msg){
  const e=$('loading-error');e.textContent=msg;e.classList.add('show');
  document.querySelector('.loading-spinner') && (document.querySelector('.loading-spinner').style.display='none');
}

async function seedIfEmpty(){
  setMsg('檢查資料庫...');
  const itSnap=await getDocs(collection(db,'itinerary'));
  if(itSnap.empty){
    setMsg('寫入行程資料...');
    const b=writeBatch(db);
    for(const [date,evs] of Object.entries(SEED_ITINERARY))
      for(const ev of evs) b.set(doc(db,'itinerary',ev.id),{...ev,date,createdAt:Date.now()});
    await b.commit();
  }
  const tdSnap=await getDocs(collection(db,'todos'));
  if(tdSnap.empty){
    setMsg('寫入待辦清單...');
    const b=writeBatch(db);
    for(const t of SEED_TODOS) b.set(doc(db,'todos',t.id),t);
    await b.commit();
  }
  const exSnap=await getDocs(collection(db,'expenses'));
  if(exSnap.empty){
    setMsg('寫入花費記錄...');
    const b=writeBatch(db);
    for(const e of SEED_EXPENSES) b.set(doc(db,'expenses',e.id),e);
    await b.commit();
  }
}

function startListeners(){
  setMsg('載入資料...');
  let itDone=false,tdDone=false,exDone=false;
  function ready(){if(itDone&&tdDone&&exDone)showApp();}
  onSnapshot(collection(db,'itinerary'),snap=>{
    appData.itinerary={};
    snap.forEach(d=>{const ev=d.data();if(!appData.itinerary[ev.date])appData.itinerary[ev.date]=[];appData.itinerary[ev.date].push(ev);});
    if(!itDone){itDone=true;ready();}else{setSyncState('online','已同步');render();}
  },err=>{setSyncState('error','同步失敗');console.error(err);});
  onSnapshot(collection(db,'todos'),snap=>{
    appData.todos=[];snap.forEach(d=>appData.todos.push(d.data()));
    appData.todos.sort((a,b)=>(a.order||0)-(b.order||0));
    if(!tdDone){tdDone=true;ready();}else{setSyncState('online','已同步');render();}
  },err=>{setSyncState('error','同步失敗');console.error(err);});
  onSnapshot(collection(db,'expenses'),snap=>{
    appData.expenses=[];snap.forEach(d=>appData.expenses.push(d.data()));
    appData.expenses.sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    if(!exDone){exDone=true;ready();}else{setSyncState('online','已同步');render();}
  },err=>{setSyncState('error','同步失敗');console.error(err);});
}

async function boot(){
  try{await seedIfEmpty();startListeners();}
  catch(e){console.error(e);showError('Firebase 連線失敗：'+e.message+'\n\n請確認 Firestore 已開啟測試模式');}
}
boot();

window.switchTab=function(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  $('nav-'+tab).classList.add('active');
  $('fab').style.display=tab==='exchange'?'none':'flex';
  render();
};
window.setDate=function(d){selectedDate=d;render();};

window.render=function(){
  const el=$('app-content');el.innerHTML='';
  if(currentTab==='itinerary')el.appendChild(buildItinerary());
  else if(currentTab==='todo')el.appendChild(buildTodo());
  else if(currentTab==='expenses')el.appendChild(buildExpenses());
  else el.appendChild(buildExchange());
};

// ─ Day labels ─
const DAY_META={
  '2026-04-02':{icon:'✈️',theme:'抵達日'},
  '2026-04-03':{icon:'⛴️',theme:'維港遊'},
  '2026-04-04':{icon:'🏘️',theme:'在地探索'},
  '2026-04-05':{icon:'🎁',theme:'回家日'}
};

function buildItinerary(){
  const wrap=document.createElement('div');
  const DATES=[{val:'2026-04-02',day:'DAY 1',label:'4/2 四'},{val:'2026-04-03',day:'DAY 2',label:'4/3 五'},{val:'2026-04-04',day:'DAY 3',label:'4/4 六'},{val:'2026-04-05',day:'DAY 4',label:'4/5 日'}];
  let tabs='<div class="date-tabs">';
  DATES.forEach(d=>{tabs+=`<div class="date-tab ${d.val===selectedDate?'active':''}" onclick="setDate('${d.val}')"><span class="day-label">${d.day}</span><span class="date-label">${d.label}</span></div>`;});
  tabs+='</div>';

  const meta=DAY_META[selectedDate]||{icon:'📍',theme:'行程'};
  const banner=`<div class="hk-banner"><div class="hk-banner-text"><div class="hk-banner-title">${meta.icon} ${meta.theme}</div><div class="hk-banner-sub">${selectedDate.replace('2026-','').replace('-','/')} · ${(appData.itinerary[selectedDate]||[]).length} 個行程</div></div><div class="hk-banner-icons"><span>🍵</span><span>🚋</span><span>🌃</span></div></div>`;

  const events=(appData.itinerary[selectedDate]||[]).slice().sort((a,b)=>a.time.localeCompare(b.time));
  let tl='<div class="timeline">';
  if(!events.length)tl+='<div class="empty-state"><span class="empty-state-icon">📋</span>尚無行程<br>點擊右下角 + 新增</div>';
  events.forEach((ev,i)=>{
    const loc=ev.location?`<button class="location-chip" onclick="openGoogleMaps('${ev.location.replace(/'/g,"\\'")}')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>${ev.location}</button>`:'';
    const note=ev.note?`<div class="tl-note">${ev.note}</div>`:'';
    tl+=`<div class="tl-item" style="animation-delay:${i*0.05}s"><div class="tl-time">${ev.time}</div><div class="tl-spine"><div class="tl-dot"></div><div class="tl-line"></div></div><div class="tl-card"><div class="tl-card-header"><div class="tl-title">${ev.title}</div><div class="tl-actions"><button class="tl-btn" onclick="openEditItinerary('${ev.id}')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button><button class="tl-btn del" onclick="deleteItinerary('${ev.id}')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button></div></div>${loc}${note}</div></div>`;
  });
  tl+='</div>';
  wrap.innerHTML=tabs+banner+tl;
  return wrap;
}

function buildTodo(){
  const wrap=document.createElement('div');wrap.className='section-pad';
  const done=appData.todos.filter(t=>t.done).length,total=appData.todos.length,pct=total?Math.round(done/total*100):0;
  let html=`<div class="section-hero"><div class="section-hero-icon">☑️</div><div><div class="section-hero-title">行前準備清單</div><div class="section-hero-sub">出發前確認所有項目</div></div></div>
  <div style="height:14px"></div>
  <div class="progress-card">
    <div class="progress-header"><span class="progress-title">完成進度</span><span class="progress-count">${done} / ${total}</span></div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="progress-label">${pct===100?'🎉 全部完成！準備出發香港囉！':'還剩 '+(total-done)+' 項待完成'}</div>
  </div>
  <div class="todo-list">`;
  appData.todos.forEach(t=>{html+=`<div class="todo-item"><input type="checkbox" class="todo-checkbox" ${t.done?'checked':''} onchange="toggleTodo('${t.id}')"><label class="todo-label ${t.done?'done':''}" onclick="toggleTodo('${t.id}')">${t.text}</label><button class="todo-del" onclick="deleteTodo('${t.id}')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button></div>`;});
  html+='</div>';
  wrap.innerHTML=html;return wrap;
}

function buildExpenses(){
  const wrap=document.createElement('div');
  let totalTwd=0,totalHkd=0,twdOnly=0;
  appData.expenses.forEach(e=>{if(e.currency==='TWD'){totalTwd+=+e.amount;twdOnly+=+e.amount;}if(e.currency==='HKD'){totalHkd+=+e.amount;totalTwd+=+e.amount*RATE;}});
  let html=`<div class="section-hero"><div class="section-hero-icon">💰</div><div><div class="section-hero-title">旅費記帳</div><div class="section-hero-sub">HKD ↔ TWD 自動換算</div></div></div>
  <div class="expense-hero">
    <div class="expense-label">預估總花費（台幣換算）</div>
    <div class="expense-total">NT$ ${Math.round(totalTwd).toLocaleString()}</div>
    <div class="expense-split">
      <div class="expense-split-item"><div class="split-label">台幣支出</div><div class="split-val">NT$ ${Math.round(twdOnly).toLocaleString()}</div></div>
      <div class="expense-split-item"><div class="split-label">港幣支出</div><div class="split-val">HK$ ${Math.round(totalHkd).toLocaleString()}</div></div>
    </div>
  </div>
  <div class="expense-section-title">消費明細</div>
  <div class="expense-list">`;
  if(!appData.expenses.length)html+=`<div class="empty-state" style="padding:32px 0">目前沒有花費紀錄</div>`;
  [...appData.expenses].reverse().forEach(e=>{const isHkd=e.currency==='HKD';html+=`<div class="expense-item"><div class="expense-item-left"><div class="expense-item-name">${e.title}</div><div class="expense-item-type">${isHkd?'🏙️ 當地開銷':'🏠 行前開銷'}</div></div><div class="expense-item-right"><div><div class="expense-amount ${isHkd?'hkd':'twd'}">${e.currency} ${(+e.amount).toLocaleString()}</div>${isHkd?`<div class="expense-approx">≈ NT$ ${Math.round(e.amount*RATE).toLocaleString()}</div>`:''}</div><button class="expense-del" onclick="deleteExpense('${e.id}')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button></div></div>`;});
  html+='</div><div style="height:16px"></div>';
  wrap.innerHTML=html;return wrap;
}

function buildExchange(){
  const wrap=document.createElement('div');wrap.className='exchange-wrap';
  wrap.innerHTML=`
  <div class="section-hero" style="width:100%;max-width:380px;border-radius:12px;border:1.5px solid var(--paper2);margin-bottom:0">
    <div class="section-hero-icon">🧮</div>
    <div><div class="section-hero-title">匯率換算</div><div class="section-hero-sub">茶餐廳結帳即用</div></div>
  </div>
  <div class="exchange-card">
    <div class="exchange-header">
      <div class="exchange-header-title">港幣 ⇄ 台幣</div>
      <div class="exchange-rate-label">參考匯率：1 HKD ≈ 4.1 TWD</div>
    </div>
    <div class="exchange-body">
      <div class="calc-field"><label>港幣 HKD</label><div class="calc-input-wrap"><span class="calc-currency">HK$</span><input type="number" id="calc-hkd" class="calc-input" placeholder="0" oninput="calcEx('hkd')"></div></div>
      <div class="exchange-divider"><div class="exchange-arrow"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg></div></div>
      <div class="calc-field"><label>台幣 TWD</label><div class="calc-input-wrap"><span class="calc-currency">NT$</span><input type="number" id="calc-twd" class="calc-input result" placeholder="0" oninput="calcEx('twd')"></div></div>
    </div>
  </div>
  <div class="exchange-tip">🍵 去茶餐廳、街市買嘢時<br>輸入港幣即時換算台幣</div>`;
  return wrap;
}

window.openGoogleMaps=loc=>{if(loc)window.open('https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(loc),'_blank');};
window.handleFabClick=function(){if(currentTab==='itinerary')openItineraryModal();else if(currentTab==='expenses')openExpenseModal();else if(currentTab==='todo')openTodoModal();};
window.handleOverlayClick=e=>{if(e.target===$('modal-overlay'))closeModal();};
function openM(id){$('modal-overlay').classList.add('show');$(id).classList.add('show');}
window.closeModal=function(){$('modal-overlay').classList.remove('show');['itinerary-modal','expense-modal','todo-modal'].forEach(id=>$(id).classList.remove('show'));};

function openItineraryModal(editId=null){
  $('edit-itinerary-id').value=editId||'';
  $('itinerary-modal-title').textContent=editId?'編輯行程':'新增行程';
  if(editId){const ev=(appData.itinerary[selectedDate]||[]).find(e=>e.id===editId);if(ev){$('itinerary-time').value=ev.time;$('itinerary-title').value=ev.title;$('itinerary-location').value=ev.location||'';$('itinerary-note').value=ev.note||'';}}
  else{$('itinerary-time').value='12:00';$('itinerary-title').value='';$('itinerary-location').value='';$('itinerary-note').value='';}
  openM('itinerary-modal');setTimeout(()=>$('itinerary-title').focus(),150);
}
window.openEditItinerary=id=>openItineraryModal(id);
window.saveItinerary=async function(){
  const id=$('edit-itinerary-id').value,time=$('itinerary-time').value,title=$('itinerary-title').value.trim(),loc=$('itinerary-location').value.trim(),note=$('itinerary-note').value.trim();
  if(!title||!time){alert('請填寫時間與標題');return;}
  setSyncState('saving','儲存中...');
  const docId=id||('i'+Date.now());
  await setDoc(doc(db,'itinerary',docId),{id:docId,time,title,location:loc,note,date:selectedDate,createdAt:Date.now()});
  closeModal();
};
window.deleteItinerary=async function(id){if(!confirm('確定要刪除？'))return;setSyncState('saving','刪除中...');await deleteDoc(doc(db,'itinerary',id));};

function openTodoModal(){$('todo-input').value='';openM('todo-modal');setTimeout(()=>$('todo-input').focus(),150);}
window.saveTodo=async function(){const text=$('todo-input').value.trim();if(!text)return;setSyncState('saving','儲存中...');const id='t'+Date.now();await setDoc(doc(db,'todos',id),{id,text,done:false,order:appData.todos.length});closeModal();};
window.toggleTodo=async function(id){const t=appData.todos.find(t=>t.id===id);if(!t)return;setSyncState('saving','儲存中...');await updateDoc(doc(db,'todos',id),{done:!t.done});};
window.deleteTodo=async function(id){setSyncState('saving','刪除中...');await deleteDoc(doc(db,'todos',id));};

function openExpenseModal(){$('expense-title').value='';$('expense-amount').value='';$('expense-currency').value='HKD';openM('expense-modal');}
window.saveExpense=async function(){const title=$('expense-title').value.trim(),amount=$('expense-amount').value,currency=$('expense-currency').value;if(!title||!amount){alert('請填寫項目與金額');return;}setSyncState('saving','儲存中...');const id='e'+Date.now();await setDoc(doc(db,'expenses',id),{id,title,amount:+amount,currency,createdAt:Date.now()});closeModal();};
window.deleteExpense=async function(id){if(!confirm('確定要刪除？'))return;setSyncState('saving','刪除中...');await deleteDoc(doc(db,'expenses',id));};

window.calcEx=function(src){const hkd=$('calc-hkd'),twd=$('calc-twd');if(src==='hkd'){const v=parseFloat(hkd.value);twd.value=isNaN(v)?'':Math.round(v*RATE);}else{const v=parseFloat(twd.value);hkd.value=isNaN(v)?'':(v/RATE).toFixed(1);}};
</script>
</body>
</html>
